<div class="revenue-chart" role="img" aria-label="Gráfico de ganhos mensais dos últimos seis meses">
  <div class="revenue-chart__plot">
    @for (item of data(); track item.month) {
      <div class="revenue-chart__column">
        <span class="revenue-chart__value">
          {{ item.revenue | currency: 'BRL' : 'symbol' : '1.0-0' }}
        </span>
        <div class="revenue-chart__track">
          <div
            class="revenue-chart__bar"
            [style.height.%]="barHeight(item.revenue)"
            [class.revenue-chart__bar--current]="$last"
          ></div>
        </div>
        <span class="revenue-chart__month">{{ item.month }}</span>
      </div>
    }
  </div>
</div>
