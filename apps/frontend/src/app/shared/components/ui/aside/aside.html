<aside class="aside" aria-label="Navegação da conta" data-testid="account-navigation">
  <div class="aside_content">
    @for (group of groups(); track group.id) {
      <section class="aside_list" [attr.aria-labelledby]="'navigation-group-' + group.id">
        <h2 class="aside_title" [id]="'navigation-group-' + group.id">{{ group.label }}</h2>
        <ul>
          @for (item of group.items; track item.id) {
            <li>
              <app-aside-list-item [item]="item" (actionSelected)="handleAction($event)" />
            </li>
          }
        </ul>
      </section>
    }
  </div>
</aside>
