<app-card-detail class="card-provider" [verified]="params()!.verified" [image]="params()!.thumb">
    <div class="card-provider_content">
        <header class="card-provider_header">
            <div>
                <span class="card-provider_eyebrow">Profissional próximo</span>
                <h3 class="card-provider_title">{{ params()?.title }}</h3>
            </div>

            <app-favorite
                class="card-provider_favorite"
                [isFavorite]="params()!.favorite"
                (favoriteToggle)="favoriteToggle.emit()"
            />
        </header>

        <div class="card-provider_details">
            @for (subtitle of subtitles(); track $index) {
            <span class="card-provider_subtitle">
                <fa-icon [icon]="subtitle.icon" aria-hidden="true"></fa-icon>
                {{ subtitle.label }}
            </span>
            }
        </div>

        <app-price [value]="params()!.price" />

        <footer class="card-provider_footer">
            <app-button color="customer" typeColor="outline" (click)="clickButton.emit()">
                Ver perfil
            </app-button>
        </footer>
    </div>
</app-card-detail>
