<header class="header">
  <div class="header_leading">
    <button
      #menuTrigger
      id="header-menu-button"
      class="header_menu-button"
      type="button"
      aria-label="Abrir menu"
      aria-controls="mobile-navigation-drawer"
      [attr.aria-expanded]="menuOpen()"
      data-testid="header-menu-button"
      (click)="menuToggle.emit()"
    >
      <fa-icon [icon]="menuIcon" aria-hidden="true" />
    </button>

    <button
      class="header_brand"
      type="button"
      (click)="navigateToHome()"
      aria-label="Ir para o início"
    >
      <span class="header_brand-mark" aria-hidden="true">P</span>
      <span class="header_brand-name">Proxi</span>
    </button>
  </div>

  <div class="header_content">
    <app-notification />
    <app-profile-header />
  </div>
</header>
