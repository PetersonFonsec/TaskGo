<div class="rating" role="group" aria-label="Avaliação de 1 a 5 estrelas" (mouseleave)="hoverValue.set(0)">
  @for (star of stars; track star) {
    <button type="button" [class.active]="active(star)" [disabled]="readonly()" [attr.aria-label]="star + (star === 1 ? ' estrela' : ' estrelas')" [attr.aria-pressed]="star === value()" (mouseenter)="hoverValue.set(star)" (focus)="hoverValue.set(star)" (blur)="hoverValue.set(0)" (click)="select(star)">★</button>
  }
</div>
