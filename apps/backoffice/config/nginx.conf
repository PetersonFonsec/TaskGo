server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header content-type text/plain;
    return 200 "# backoffice healthy\nbackoffice_health 1\n";
  }

  location /assets/ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
