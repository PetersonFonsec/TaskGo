global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets:
        - backend:3000

  - job_name: backoffice
    metrics_path: /health
    static_configs:
      - targets:
        - backoffice:80

  - job_name: prometheus
    static_configs:
      - targets:
        - localhost:9090
