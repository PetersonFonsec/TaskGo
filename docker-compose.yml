services:
  postgres_db:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    env_file:
      - ./config/db.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: dockerfile
    depends_on:
      postgres_db:
        condition: service_healthy
    env_file:
      - ./config/backend.env
    ports:
      - "3000:3000"
    restart: always

  # frontend:
  #   depends_on:
  #     - backend
  #   build:
  #     context: ./apps/frontend
  #     dockerfile: Dockerfile.dev
  #   ports:
  #     - "4200:4200"
  #   environment:
  #     CHOKIDAR_USEPOLLING: "true"
  #   restart: "always"
  #   volumes:
  #     - "./apps/frontend/:/app"
  #     - "frontend_node_modules:/app/node_modules"
volumes:
  postgres_db:
    driver: local
  frontend_node_modules:
    driver: local
